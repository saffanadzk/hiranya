server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    root /var/www/hiranya;

    index index.php index.html index.htm;

    charset utf-8;

    # Access logs
    access_log /var/log/nginx/hiranya_access.log;
    error_log /var/log/nginx/hiranya_error.log;

    # Main routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Prevent access to hidden files (.git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Prevent direct access to logs directory
    location /logs {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache static assets for premium performance
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|xml|webp|woff2|woff|ttf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Pass PHP scripts to PHP-FPM fastcgi proxy
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
